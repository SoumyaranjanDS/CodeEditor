services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auracode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    volumes:
      - ./apps/api:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    image: node:24
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    working_dir: /app
    volumes:
      - ./apps/web:/app
    ports:
      - "5173:5173"
    depends_on:
      - api
